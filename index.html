<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scattergories - Pro Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #ffffff; color: #111111; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    
    #start-screen, #time-up-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; min-height: 80vh; text-align: center; }
    .game-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 18vw, 10rem); line-height: 0.9; color: #111111; }
    .game-title span { color: #c8a000; }
    .subtitle { font-size: 1.5rem; color: #555555; letter-spacing: 0.15em; text-transform: uppercase; }
    
    .start-btn { background: #111111; color: #ffffff; border: none; padding: 1.5rem 4rem; font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; cursor: pointer; border-radius: 8px; transition: transform 0.15s; }
    .start-btn:hover { transform: scale(1.05); background: #333333; }

    #play-screen { display: none; width: 100%; max-width: 900px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 4px solid #f0f0f0; padding-bottom: 1.5rem; }
    
    .letter-badge { font-family: 'Bebas Neue', sans-serif; font-size: 8.5rem; color: #c8a000; line-height: 1; }
    #timer { font-family: 'Bebas Neue', sans-serif; font-size: 7.5rem; color: #111111; }
    #timer.urgent { color: #cc2222; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

    /* CATEGORY LIST - Extra Large Font for Visibility */
    .categories-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 3rem; }
    .cat-card { background: #f9f9f9; border: 3px solid #eeeeee; border-radius: 15px; padding: 2rem; display: flex; align-items: center; gap: 30px; }
    .cat-num { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: #c8a000; min-width: 60px; }
    .cat-text { font-size: 2rem; font-weight: 600; color: #111111; } 

    .scoring-box { font-size: 1.5rem; background: #fffdf2; padding: 2.5rem; border-radius: 12px; border: 2px dashed #c8a000; margin-top: 1rem; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="start-screen">
    <div>
      <p class="subtitle">Ultimate Letter Category Game</p>
      <div class="game-title">SCATTER<span>GORIES</span></div>
    </div>
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>

  <div id="play-screen">
    <div class="top-bar">
      <div><p class="subtitle" style="font-size:1.2rem;">Current Letter</p><div class="letter-badge" id="letter-display">S</div></div>
      <div><p class="subtitle" style="font-size:1.2rem; text-align:right;">Timer</p><div id="timer">60</div></div>
    </div>
    <div class="categories-grid" id="categories"></div>
  </div>

  <div id="time-up-screen" style="display:none;">
    <div class="game-title" style="color:#cc2222;">PENCILS DOWN!</div>
    <div class="scoring-box">
      <strong>Scoring Rules:</strong><br>
      • <strong>+1 point</strong> for Unique Answers<br>
      • <strong>0 points</strong> for Duplicates or Blanks<br>
      • <strong>Bonus!</strong> One extra point for creative answers the group likes.
    </div>
    <button class="start-btn" style="margin-top:2rem;" onclick="startGame()">Next Round</button>
  </div>

  <script>
    const DATA = {
      "S": ["A country", "A city", "A food or drink", "An animal", "A famous person", "A car brand", "A movie or TV show", "Something at the beach", "Something for vacation", "A sports team", "A musical artist", "A job or profession"],
      "B": ["A country", "A fruit or vegetable", "A type of clothing", "An animal", "A car brand", "A movie or TV show", "A school subject", "Something in a kitchen", "A musical artist", "A world leader", "A holiday destination", "A children's game"],
      "M": ["A country", "A city", "A food or drink", "Something round", "A famous person", "A car brand", "A hobby or sport", "A body of water", "A boy's name", "A girl's name", "Something cold", "A piece of furniture"]
    };

    let timerInterval = null;

    function startGame() {
      const letters = Object.keys(DATA);
      const letter = letters[Math.floor(Math.random() * letters.length)];
      const categories = DATA[letter];

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('time-up-screen').style.display = 'none';
      document.getElementById('play-screen').style.display = 'block';
      document.getElementById('letter-display').textContent = letter;

      const grid = document.getElementById('categories');
      grid.innerHTML = '';
      categories.forEach((cat, i) => {
        grid.innerHTML += `<div class="cat-card"><span class="cat-num">${i+1}</span><span class="cat-text">${cat}</span></div>`;
      });

      let timeLeft = 60; 
      const display = document.getElementById('timer');
      display.classList.remove('urgent');
      display.textContent = timeLeft;
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        display.textContent = timeLeft;
        if (timeLeft <= 10) display.classList.add('urgent');
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          document.getElementById('play-screen').style.display = 'none';
          document.getElementById('time-up-screen').style.display = 'flex';
        }
      }, 1000);
    }
  </script>
</body>
</html>
