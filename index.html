<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scattergories - Pro Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #ffffff; color: #111111; display: flex; flex-direction: column; align-items: center; padding: 1rem; overflow: hidden; }
    
    #start-screen, #time-up-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; min-height: 90vh; text-align: center; }
    .game-title { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; line-height: 0.9; color: #111111; }
    .game-title span { color: #c8a000; }
    
    .start-btn { background: #111111; color: #ffffff; border: none; padding: 1rem 2.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; cursor: pointer; border-radius: 6px; }

    #play-screen { display: none; width: 100%; max-width: 1000px; }
    .top-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.5rem; }
    
    .letter-badge { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; color: #c8a000; line-height: 0.8; }
    #timer { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; color: #111111; line-height: 0.8; }
    #timer.urgent { color: #cc2222; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

    .categories-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    @media (max-width: 700px) { .categories-grid { grid-template-columns: 1fr; } }
    
    .cat-card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 15px; }
    .cat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #c8a000; min-width: 30px; }
    .cat-text { font-size: 1.25rem; font-weight: 600; color: #111111; } 

    .bottom-bar { display: flex; gap: 10px; width: 100%; }
    .action-btn { flex: 1; padding: 0.8rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; border-radius: 6px; border: 2px solid #111111; background: white; }
    .action-btn.primary { background: #111111; color: white; }

    .scoring-box { font-size: 1.1rem; background: #fffdf2; padding: 1rem; border-radius: 8px; border: 1px dashed #c8a000; line-height: 1.4; }
  </style>
</head>
<body>

  <div id="start-screen">
    <div>
      <div class="game-title">SCATTER<span>GORIES</span></div>
      <p style="margin-top:0.5rem; color:#888; letter-spacing:2px;">THE ULTIMATE LETTER GAME</p>
    </div>
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>

  <div id="play-screen">
    <div class="top-bar">
      <div><p style="font-size:0.7rem; text-transform:uppercase; color:#888;">Letter</p><div class="letter-badge" id="letter-display">S</div></div>
      <div><p style="font-size:0.7rem; text-transform:uppercase; color:#888; text-align:right;">Timer</p><div id="timer">60</div></div>
    </div>
    <div class="categories-grid" id="categories"></div>
    <div class="bottom-bar">
      <button class="action-btn" onclick="startGame()">New Round</button>
      <button class="action-btn primary" onclick="stopTimer()">Stop Timer</button>
    </div>
  </div>

  <div id="time-up-screen" style="display:none;">
    <div class="game-title" style="color:#cc2222; font-size:4rem;">Is that all you gat!!!?</div>
    <div class="scoring-box">
      <strong>Scoring :</strong><br>
      • +1 point for Unique Answers<br>
      • 0 points for Duplicates or Blanks
    </div>
    <button class="start-btn" style="margin-top:1rem;" onclick="startGame()">Next Round</button>
  </div>

  <script>
    const DATA = {
      "S": ["A country", "A city", "A food or drink", "An animal", "A famous person", "A car brand", "A movie or TV show", "Something at the beach", "Something for vacation", "A sports team", "A musical artist", "A job or profession"],
      "B": ["A country", "A fruit or vegetable", "A type of clothing", "An animal", "A car brand", "A movie or TV show", "A school subject", "Something in a kitchen", "A musical artist", "A world leader", "A holiday destination", "A children's game"],
      "M": ["A country", "A city", "A food or drink", "Something round", "A famous person", "A car brand", "A hobby or sport", "A body of water", "A boy's name", "A girl's name", "Something cold", "A piece of furniture"]
    };

    let timerInterval = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, duration, type = 'sine') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function startGame() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const letters = Object.keys(DATA);
      const letter = letters[Math.floor(Math.random() * letters.length)];
      const categories = DATA[letter];

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('time-up-screen').style.display = 'none';
      document.getElementById('play-screen').style.display = 'block';
      document.getElementById('letter-display').textContent = letter;

      const grid = document.getElementById('categories');
      grid.innerHTML = '';
      categories.forEach((cat, i) => {
        grid.innerHTML += `<div class="cat-card"><span class="cat-num">${i+1}</span><span class="cat-text">${cat}</span></div>`;
      });

      let timeLeft = 60; 
      const display = document.getElementById('timer');
      display.classList.remove('urgent');
      display.textContent = timeLeft;
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        display.textContent = timeLeft;
        if (timeLeft <= 10 && timeLeft > 0) {
          display.classList.add('urgent');
          playSound(440, 0.05); 
        }
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          playSound(110, 1.2, 'sawtooth'); 
          document.getElementById('play-screen').style.display = 'none';
          document.getElementById('time-up-screen').style.display = 'flex';
        }
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      playSound(110, 1.2, 'sawtooth'); 
      document.getElementById('play-screen').style.display = 'none';
      document.getElementById('time-up-screen').style.display = 'flex';
    }
  </script>
</body>
</html>
