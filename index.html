<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scattergories - Pro-Gamer</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Maiandra GD", "Segoe UI", Tahoma, sans-serif;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 1rem;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      z-index: 1;
    }

    /* ===== LIVE BACKGROUND ===== */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: saturate(1.3) contrast(1.1);
    }

    #bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.78);
      z-index: -1;
    }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
    }

    .game-title span { color: #c8a000; }

    #start-screen, #time-up-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      min-height: 85vh;
    }

    .start-btn {
      background: #111;
      color: #fff;
      border: none;
      padding: 1rem 2rem;
      font-family: 'Bebas Neue';
      font-size: 1.8rem;
      cursor: pointer;
      border-radius: 8px;
      margin: 5px;
    }

    #play-screen {
      display: none;
      width: 100%;
      max-width: 1100px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .letter-badge, #timer {
      font-family: 'Bebas Neue';
      font-size: 5rem;
    }

    .letter-badge { color: #c8a000; }

    .categories-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 800px) {
      .categories-grid { grid-template-columns: 1fr; }
    }

    .cat-card {
      border: 1px solid #ddd;
      padding: 1rem;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
    }

    .cat-num {
      color: #c8a000;
      font-weight: bold;
    }

    .bottom-bar {
      margin-top: 1rem;
      display: flex;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      padding: 0.8rem;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .primary {
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<!-- 🔥 LIVE BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="https://cdn.coverr.co/videos/coverr-ink-in-water-2766/1080p.mp4" type="video/mp4">
</video>

<!-- 🌫️ OVERLAY -->
<div id="bg-overlay"></div>

<!-- START SCREEN -->
<div id="start-screen">
  <div class="game-title">SCATTER<span>GORIES</span></div>
  <button class="start-btn" onclick="startGame('beginner')">Beginner</button>
  <button class="start-btn" onclick="startGame('pro')">Pro Gamer</button>
</div>

<!-- GAME SCREEN -->
<div id="play-screen">
  <div class="top-bar">
    <div class="letter-badge" id="letter-display">A</div>
    <div id="timer">60</div>
  </div>

  <div id="categories" class="categories-grid"></div>

  <div class="bottom-bar">
    <button class="action-btn" onclick="startGame()">New Round</button>
    <button class="action-btn primary" onclick="stopTimer()">Stop</button>
  </div>
</div>

<!-- TIME UP -->
<div id="time-up-screen" style="display:none;">
  <div class="game-title">TIME UP!</div>
  <button class="start-btn" onclick="startGame()">Next Round</button>
</div>

<script>
const QUESTION_BANK = {
  beginner: [
    "A fruit","An animal","A cartoon character","A color",
    "A toy","A snack","A drink","A superhero",
    "A game","Something in a classroom","Something you wear",
    "A body part","A vegetable","A bird","A movie",
    "Something cold","Something hot","A country","A city",
    "A holiday","A job","A sport","A musical instrument",
    "Something funny","Something scary"
  ],
  pro: [
    "A country","A capital city","A global company","A startup",
    "A movie","A Netflix show","A song","A music artist",
    "A book","An author","A historical event","A scientist",
    "A car brand","A luxury brand","A phone brand",
    "A politician","A business term","A sport",
    "A sports team","A famous person","A tourist destination",
    "A tech company","A social media platform",
    "Something expensive","Something embarrassing",
    "Something addictive","Something powerful","Something rare"
  ]
};

let currentLevel = "beginner";
let lastLetter = null;
let lastQuestions = [];
let timerInterval;

function getRandomLetter() {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
  let letter;
  do {
    letter = letters[Math.floor(Math.random() * letters.length)];
  } while (letter === lastLetter);
  lastLetter = letter;
  return letter;
}

function getRandomQuestions(pool, count = 10) {
  let selected;
  do {
    selected = [...pool].sort(() => 0.5 - Math.random()).slice(0, count);
  } while (JSON.stringify(selected) === JSON.stringify(lastQuestions));
  lastQuestions = selected;
  return selected;
}

function startGame(level = currentLevel) {
  currentLevel = level;

  const letter = getRandomLetter();
  const questions = getRandomQuestions(QUESTION_BANK[currentLevel]);

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("time-up-screen").style.display = "none";
  document.getElementById("play-screen").style.display = "block";

  document.getElementById("letter-display").textContent = letter;

  const grid = document.getElementById("categories");
  grid.innerHTML = "";

  questions.forEach((q, i) => {
    grid.innerHTML += `
      <div class="cat-card">
        <span class="cat-num">${i + 1}</span>
        <span>${q} starting with <b>${letter}</b></span>
      </div>
    `;
  });

  let time = 60;
  document.getElementById("timer").textContent = time;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").textContent = time;

    if (time <= 0) {
      clearInterval(timerInterval);
      endRound();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  endRound();
}

function endRound() {
  document.getElementById("play-screen").style.display = "none";
  document.getElementById("time-up-screen").style.display = "flex";
}
</script>

</body>
</html>
